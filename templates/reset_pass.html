<!-- templates/reset_pass.html -->
{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6">
        <div class="glass-panel text-center">
            <h2 class="mb-4"><i class="bi bi-unlock"></i> Recuperar Cuenta</h2>
            <p class="mb-4">Por favor, sube el archivo de tu <strong>llave de recuperación</strong> que se generó cuando te registraste. Este archivo contiene la información encriptada para validar tu identidad.</p>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label for="key_file" class="form-label text-start w-100">Seleccionar archivo de llave (.txt o .json)</label>
                    <input class="form-control glass-input" type="file" id="key_file" name="key_file" required accept=".txt,.json">
                </div>
                
                <button type="submit" class="btn glass-btn w-100 mb-3">Verificar Llave</button>
            </form>
            
            <div class="mt-3">
                <a href="{{ url_for('user.login') }}" class="text-white text-decoration-none"><i class="bi bi-arrow-left"></i> Volver al Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
